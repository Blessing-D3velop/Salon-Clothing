<!DOCTYPE html>
<html>
  <head>
    <title>Salon</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="CSS/Header.css">
    <link rel="stylesheet" href="CSS/Footer.css">
    <link rel="stylesheet" href="CSS/Salon and Clothing-page.css">
    <link rel="stylesheet" href="CSS/Clothing.css">
    <link rel="stylesheet" href="CSS/Jeans.css">
    <link rel="stylesheet" href="CSS/Checkout.css">
  </head>
  <body>
      <header>
        <div class="heading">
          <p class="heading-text">Elegance & Style</p>
        </div>
        <div class="cart-container js-cart-container">
          <a class="cart-link header-link" href="Checkout.html">
            <img class="cart" src="Images and Icons/icons/cart-icon.png">
            <div class="cart-quantity js-cart-quantity">0</div>
          </a>
        </div>
        <div class="hero-section">
          <p class="home js-home">Home</p>
          <p class="salon js-salon">Salon</p>
          <p class="clothing js-clothing">Clothing</p>
        </div>
      </header>  

      <main class="main-page">

        <a href="Clothing-Jeans.html" class="return-link">
          <div class="return-to-jeans-link">
            < Return to Jeans
          </div>
        </a>

        <div class="checkout-container">
          <div class="shopping-cart-container">
            <p class="heading-text">Shopping Cart</p>

            <div class="line"></div>

            <div class="products-container js-products-container"></div>
          </div>


          <div class="order-summary-container">
              <div>
                <p class="order-summary">Order Summary</p>
                <div class="line"></div>
              </div>
              <div class="items-container">
                <p>Total items:</p>
                <p>0</p>
              </div>
              <div class="shiping-container">
                <p>shiping & handling:</p>
                <p>$0</p>
              </div>
              <div class="tax-container">
                <p>Total before tax:</p>
                <p>$0</p>
              </div>
              <div class="price-container">
                <p>Total Price:</p>
                <p>$0</p>
              </div>
              <div class="button-place-order-container">
                <button class="place-order-button">Place Order</button>
              </div>
          </div>
        </div>
      </main>


      <script type="module" src="Clothing.js"></script>
      <script type="module" src="Jeans.js"></script>
      <script type="module" src="Header.js"></script>
      <script type="module" src="Checkout.js"></script>
  </body>
</html>
